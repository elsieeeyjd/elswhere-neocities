<!doctype html><html data-theme="light" lang="en"><head><meta charset="UTF-8"><title>Petting Sim</title><style>body,html{border:none;margin:0;padding:0}body{font-family:VT323,monospace;font-size:12px;background:0 0;color:#7978a1}#container{display:flex;justify-content:center;align-items:center;gap:4rem;margin:0;height:100vh;flex-direction:row}#pettingmenu{display:flex;flex-direction:column;gap:8px;align-items:center}.petitems{width:80px;height:auto;cursor:pointer;position:relative}#pet{flex-shrink:0}#pet img{max-width:300px;height:auto}</style></head><body><div id="container"><div id="pettingmenu"><img src="hand.PNG" alt="hand" class="petitems" id="hand"> <img src="soap.PNG" alt="soap" class="petitems" id="soap"></div><div id="pet"><img src="cat.PNG" alt="cat" id="cat"></div></div><script>const petItems=document.querySelectorAll(".petitems"),originalPosition=new Map;let isFollowing=!1,currentItem=null,placeholder=null;window.addEventListener("DOMContentLoaded",()=>{petItems.forEach(e=>{const t=e.getBoundingClientRect();originalPosition.set(e,{left:t.left,top:t.top}),e.addEventListener("click",()=>{isFollowing||(currentItem=e,isFollowing=!0,placeholder=document.createElement("div"),placeholder.style.width=`${e.offsetWidth}px`,placeholder.style.height=`${e.offsetHeight}px`,placeholder.style.display="block",placeholder.style.visibility="hidden",e.parentNode.insertBefore(placeholder,e),currentItem.style.position="absolute",currentItem.style.zIndex="10")})})}),document.addEventListener("mousemove",e=>{isFollowing&&currentItem&&(currentItem.style.left=`${e.pageX}px`,currentItem.style.top=`${e.pageY}px`)}),document.addEventListener("keydown",e=>{if("e"===e.key.toLowerCase()&&isFollowing&&currentItem){originalPosition.get(currentItem);currentItem.style.left="",currentItem.style.top="",placeholder&&(placeholder.parentNode.removeChild(placeholder),placeholder=null),currentItem.style.position="relative",isFollowing=!1,currentItem=null}})</script></body></html>
